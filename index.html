<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Teste de Temperamentos</title>

<style>
:root{
  --bg:#f7f7fb;
  --card:#fff;
  --primary:#6b46c1;
  --muted:#6b7280;
}

*{
  box-sizing:border-box;
  font-family:Arial, sans-serif;
}

body{
  margin:0;
  background:var(--bg);
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  padding:20px;
}

.wrap{
  width:100%;
  max-width:800px;
}

.card{
  background:#fff;
  border-radius:12px;
  padding:24px;
  box-shadow:0 5px 20px rgba(0,0,0,0.08);
}

.hidden{
  display:none;
}

.hero{
  text-align:center;
}

.hero img{
  width:100%;
  border-radius:12px;
}

button{
  border:none;
  background:#6b46c1;
  color:#fff;
  padding:12px 20px;
  border-radius:10px;
  cursor:pointer;
  margin-top:10px;
}

button.ghost{
  background:#eee;
  color:#333;
}

.progress{
  height:10px;
  background:#eee;
  border-radius:999px;
  overflow:hidden;
  margin-bottom:20px;
}

.bar{
  height:100%;
  width:0%;
  background:#6b46c1;
}

.question-img{
  width:100%;
  border-radius:12px;
  margin-bottom:15px;
}

.options{
  display:grid;
  gap:10px;
}

.option{
  border:1px solid #ddd;
  border-radius:10px;
  padding:12px;
  cursor:pointer;
}

.option.selected{
  border-color:#6b46c1;
  background:#f4f0ff;
}

.controls{
  display:flex;
  justify-content:space-between;
  margin-top:20px;
}

.result{
  text-align:center;
}

.result img{
  width:220px;
  border-radius:12px;
  margin:20px auto;
  display:block;
}
</style>
</head>

<body>

<div class="wrap">

  <div class="card" id="capaCard">
    <div class="hero">
      <img src="venha-comigo-descobrir-seu-temperamento.png" alt="Capa">
      <button onclick="iniciarQuiz()">Quero Descobrir</button>
    </div>
  </div>

  <div class="card hidden" id="quizCard">

    <div class="progress">
      <div class="bar" id="progressBar"></div>
    </div>

    <div id="qnum"></div>

    <img id="questionImage" class="question-img">

    <h2 id="questionText"></h2>

    <div class="options" id="optionsList"></div>

    <div class="controls">
      <button class="ghost" id="backBtn">Voltar</button>
      <button id="nextBtn">Próxima</button>
    </div>

  </div>

  <div class="card hidden" id="resultCard">
    <div class="result">
      <h2 id="resultTitle"></h2>
      <img src="vanessa-gama.jpg" alt="Resultado">
      <p id="resultText"></p>
      <button id="restartBtn">Fazer novamente</button>
    </div>
  </div>

</div>

<script>

const questionImages = [
  "pergunta1.jpg",
  "pergunta2.jpg",
  "pergunta3.jpg"
];

const questions = [
  {
    q:"Quando você participa de um grupo, você costuma:",
    options:[
      {t:"Sanguíneo", txt:"Conversar animado e ser o centro da roda"},
      {t:"Colérico", txt:"Tomar a dianteira e organizar as tarefas"},
      {t:"Melancólico", txt:"Observar e planejar antes de falar"},
      {t:"Fleumático", txt:"Manter a calma e apoiar discretamente"}
    ]
  },
  {
    q:"Num projeto, você se sente mais confortável:",
    options:[
      {t:"Sanguíneo", txt:"Trazendo ideias novas e criatividade"},
      {t:"Colérico", txt:"Definindo metas e prazos claros"},
      {t:"Melancólico", txt:"Cuidando dos detalhes"},
      {t:"Fleumático", txt:"Garantindo harmonia no time"}
    ]
  },
  {
    q:"Sua reação em conflitos geralmente é:",
    options:[
      {t:"Sanguíneo", txt:"Tentar aliviar a tensão"},
      {t:"Colérico", txt:"Encarar o problema de frente"},
      {t:"Melancólico", txt:"Refletir antes de reagir"},
      {t:"Fleumático", txt:"Evitar confronto"}
    ]
  }
];

const resultTexts = {
  "Sanguíneo":{
    title:"Seu temperamento é Sanguíneo ✨",
    text:"Você é comunicativo e cheio de energia."
  },
  "Colérico":{
    title:"Seu temperamento é Colérico 🔥",
    text:"Você é forte e determinado."
  },
  "Melancólico":{
    title:"Seu temperamento é Melancólico 🌙",
    text:"Você é profundo e analítico."
  },
  "Fleumático":{
    title:"Seu temperamento é Fleumático 🍃",
    text:"Você é equilibrado e tranquilo."
  }
};

let current = 0;
let answers = new Array(questions.length).fill(null);

const qnum = document.getElementById('qnum');
const qText = document.getElementById('questionText');
const optionsList = document.getElementById('optionsList');
const nextBtn = document.getElementById('nextBtn');
const backBtn = document.getElementById('backBtn');
const progressBar = document.getElementById('progressBar');
const quizCard = document.getElementById('quizCard');
const resultCard = document.getElementById('resultCard');
const capaCard = document.getElementById('capaCard');
const resultTitle = document.getElementById('resultTitle');
const resultText = document.getElementById('resultText');
const restartBtn = document.getElementById('restartBtn');
const questionImage = document.getElementById('questionImage');

function render(){

  qnum.textContent = `Pergunta ${current + 1} de ${questions.length}`;

  progressBar.style.width = ((current + 1) / questions.length) * 100 + '%';

  questionImage.src = questionImages[current];

  const item = questions[current];

  qText.textContent = item.q;

  optionsList.innerHTML = '';

  item.options.forEach((opt, i) => {

    const div = document.createElement('div');

    div.className = 'option';

    if(answers[current] === i){
      div.classList.add('selected');
    }

    div.textContent = opt.txt;

    div.onclick = () => {

      answers[current] = i;

      document.querySelectorAll('.option').forEach(el => {
        el.classList.remove('selected');
      });

      div.classList.add('selected');

      nextBtn.disabled = false;
    };

    optionsList.appendChild(div);
  });

  nextBtn.textContent =
    current === questions.length - 1
    ? 'Ver Resultado'
    : 'Próxima';

  nextBtn.disabled = answers[current] === null;

  backBtn.style.display = current === 0 ? 'none' : 'block';
}

nextBtn.addEventListener('click', () => {

  if(answers[current] === null) return;

  if(current === questions.length - 1){
    showResult();
    return;
  }

  current++;
  render();
});

backBtn.addEventListener('click', () => {

  if(current > 0){
    current--;
    render();
  }
});

function showResult(){

  const totals = {
    "Sanguíneo":0,
    "Colérico":0,
    "Melancólico":0,
    "Fleumático":0
  };

  answers.forEach((ans, qIndex) => {
    const tipo = questions[qIndex].options[ans].t;
    totals[tipo]++;
  });

  const winner = Object.keys(totals).reduce((a,b)=>
    totals[a] > totals[b] ? a : b
  );

  resultTitle.textContent = resultTexts[winner].title;
  resultText.textContent = resultTexts[winner].text;

  quizCard.classList.add('hidden');
  resultCard.classList.remove('hidden');
}

function iniciarQuiz(){
  capaCard.classList.add('hidden');
  quizCard.classList.remove('hidden');
  render();
}

restartBtn.addEventListener('click', () => {
  location.reload();
});

</script>

</body>
</html>
