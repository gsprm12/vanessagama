<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Teste de Temperamentos</title>

<style>
  :root{
    --bg:#f7f7fb;
    --card:#fff;
    --primary:#6b46c1;
    --muted:#6b7280;
  }

  *{
    box-sizing:border-box;
    font-family:Inter,Arial,sans-serif;
  }

  body{
    margin:0;
    background:var(--bg);
    color:#111;
    display:flex;
    justify-content:center;
    padding:24px;
  }

  .wrap{
    width:100%;
    max-width:820px;
  }

  .card{
    background:var(--card);
    border-radius:16px;
    padding:26px;
    box-shadow:0 6px 20px rgba(13,16,35,0.06);
  }

  .hidden{
    display:none;
  }

  /* CAPA */
  .hero{
    text-align:center;
  }

  .hero img{
    width:100%;
    border-radius:14px;
  }

  .hero button{
    margin-top:20px;
    padding:14px 28px;
    border:none;
    border-radius:12px;
    background:var(--primary);
    color:#fff;
    font-size:18px;
    cursor:pointer;
    font-weight:bold;
  }

  .hero button:hover{
    opacity:.92;
  }

  /* QUIZ */
  .progress{
    height:10px;
    background:#ececf3;
    border-radius:999px;
    overflow:hidden;
    margin-bottom:18px;
  }

  .bar{
    height:100%;
    width:0%;
    background:linear-gradient(90deg,#6b46c1,#9f7aea);
    transition:0.3s;
  }

  .qnum{
    font-size:14px;
    color:var(--muted);
    margin-bottom:10px;
  }

  .question-image{
    width:100%;
    border-radius:14px;
    margin-bottom:18px;
  }

  h2.question{
    margin:0 0 18px;
    font-size:22px;
  }

  .options{
    display:grid;
    gap:12px;
  }

  .option{
    background:#fafafe;
    border:1px solid #ececf3;
    padding:14px;
    border-radius:12px;
    cursor:pointer;
    transition:0.2s;
  }

  .option:hover{
    transform:translateY(-2px);
  }

  .option.selected{
    border-color:#6b46c1;
    background:#f4efff;
  }

  .controls{
    display:flex;
    gap:10px;
    justify-content:flex-end;
    margin-top:20px;
  }

  button{
    border:none;
    padding:12px 18px;
    border-radius:10px;
    cursor:pointer;
    font-weight:bold;
  }

  #nextBtn{
    background:#6b46c1;
    color:#fff;
  }

  #backBtn{
    background:#ececf3;
  }

  /* RESULTADO */
  .result{
    text-align:center;
  }

  .result img{
    max-width:260px;
    width:100%;
    border-radius:14px;
    margin:20px auto;
    display:block;
  }

  .desc{
    color:var(--muted);
    line-height:1.6;
    white-space:pre-line;
  }

  footer{
    margin-top:14px;
    text-align:center;
    color:var(--muted);
    font-size:12px;
  }

  @media(max-width:520px){
    .card{
      padding:18px;
    }

    .controls{
      flex-direction:column-reverse;
    }

    button{
      width:100%;
    }
  }
</style>
</head>

<body>

<div class="wrap">

  <!-- CAPA -->
  <div class="card" id="capaCard">
    <div class="hero">
      <img src="Venha comigo descobrir seu temperamento.png" alt="Capa do teste">

      <button onclick="iniciarQuiz()">
        Quero Descobrir
      </button>
    </div>
  </div>

  <!-- QUIZ -->
  <div class="card hidden" id="quizCard">

    <div class="progress">
      <div class="bar" id="progressBar"></div>
    </div>

    <div class="qnum" id="qnum"></div>

    <!-- IMAGEM DA PERGUNTA -->
    <img id="questionImage" class="question-image" src="" alt="Imagem da pergunta">

    <h2 class="question" id="questionText"></h2>

    <div class="options" id="optionsList"></div>

    <div class="controls">
      <button id="backBtn">Voltar</button>
      <button id="nextBtn">Próxima</button>
    </div>
  </div>

  <!-- RESULTADO -->
  <div class="card hidden" id="resultCard">
    <div class="result">

      <h2 id="resultTitle"></h2>

      <img src="Viviane Carvalho Instagram @viviacarvalho__.svg" alt="Resultado">

      <p class="desc" id="resultText"></p>

      <button id="restartBtn">
        Fazer novamente
      </button>

    </div>
  </div>

  <footer>
    Feito por você ✨
  </footer>

</div>

<script>

/* =========================
   PERGUNTAS
========================= */

const questions = [

{
q:"Quando você participa de um grupo, você costuma:",
img:"pergunta1.jpg",
options:[
{t:"Sanguíneo", txt:"Conversar animado e ser o centro da roda"},
{t:"Colérico", txt:"Tomar a dianteira e organizar as tarefas"},
{t:"Melancólico", txt:"Observar e planejar antes de falar"},
{t:"Fleumático", txt:"Manter a calma e apoiar discretamente"}
]
},

{
q:"Num projeto, você se sente mais confortável:",
img:"pergunta2.jpg",
options:[
{t:"Sanguíneo", txt:"Trazendo ideias novas e criatividade"},
{t:"Colérico", txt:"Definindo metas e prazos claros"},
{t:"Melancólico", txt:"Cuidando dos detalhes e qualidade"},
{t:"Fleumático", txt:"Garantindo harmonia no time"}
]
},

{
q:"Sua reação em conflitos geralmente é:",
img:"pergunta3.jpg",
options:[
{t:"Sanguíneo", txt:"Tentar descontrair e aliviar a tensão"},
{t:"Colérico", txt:"Encarar o problema de frente"},
{t:"Melancólico", txt:"Refletir antes de reagir"},
{t:"Fleumático", txt:"Evitar confronto e acalmar as partes"}
]
},

{
q:"Você prefere trabalhar:",
img:"pergunta4.jpg",
options:[
{t:"Sanguíneo", txt:"Em tarefas sociais e dinâmicas"},
{t:"Colérico", txt:"Em liderança ou decisões importantes"},
{t:"Melancólico", txt:"Em análise e qualidade técnica"},
{t:"Fleumático", txt:"Com rotina estável e previsível"}
]
},

{
q:"Num evento, as pessoas te descrevem como:",
img:"pergunta5.jpg",
options:[
{t:"Sanguíneo", txt:"Extrovertido e comunicativo"},
{t:"Colérico", txt:"Enérgico e direto"},
{t:"Melancólico", txt:"Reservado e organizado"},
{t:"Fleumático", txt:"Calmo e confiável"}
]
},

{
q:"Ao tomar decisões você costuma:",
img:"pergunta6.jpg",
options:[
{t:"Sanguíneo", txt:"Seguir a intuição e o sentimento do momento"},
{t:"Colérico", txt:"Agir rapidamente e com firmeza"},
{t:"Melancólico", txt:"Pesquisar e avaliar opções"},
{t:"Fleumático", txt:"Consultar outros e manter equilíbrio"}
]
},

{
q:"O que te motiva mais no trabalho?",
img:"pergunta7.jpg",
options:[
{t:"Sanguíneo", txt:"Interação social e reconhecimento"},
{t:"Colérico", txt:"Resultados e desafios"},
{t:"Melancólico", txt:"Qualidade e perfeição"},
{t:"Fleumático", txt:"Estabilidade e cooperação"}
]
},

{
q:"Você se descreve como alguém que:",
img:"pergunta8.jpg",
options:[
{t:"Sanguíneo", txt:"Empolga fácil outras pessoas"},
{t:"Colérico", txt:"Assume a responsabilidade"},
{t:"Melancólico", txt:"Preocupa-se com o certo e o errado"},
{t:"Fleumático", txt:"Procura manter a paz"}
]
},

{
q:"Quando você está em uma situação inesperada, o que faz mais sentido pra você?",
img:"pergunta9.jpg",
options:[
{t:"Sanguíneo", txt:"Tento deixar o ambiente leve"},
{t:"Colérico", txt:"Tomo a frente rapidamente"},
{t:"Melancólico", txt:"Analiso antes de agir"},
{t:"Fleumático", txt:"Mantenho a calma"}
]
}

];

/* =========================
   RESULTADOS
========================= */

const resultTexts = {

"Sanguíneo":{
title:"Sanguíneo",
text:"Você é sociável, criativo e cheio de energia. Sua presença ilumina ambientes como um letreiro de neon em noite chuvosa ✨"
},

"Colérico":{
title:"Colérico",
text:"Você é determinado, forte e orientado a resultados. Quando decide algo, transforma obstáculos em degraus."
},

"Melancólico":{
title:"Melancólico",
text:"Você é analítico, profundo e detalhista. Enxerga nuances onde muita gente vê apenas superfície."
},

"Fleumático":{
title:"Fleumático",
text:"Você é calmo, confiável e equilibrado. Sua presença funciona como porto seguro em meio ao caos."
}

};

/* =========================
   LÓGICA
========================= */

let current = 0;
const answers = new Array(questions.length).fill(null);

const qnum = document.getElementById('qnum');
const qText = document.getElementById('questionText');
const optionsList = document.getElementById('optionsList');
const nextBtn = document.getElementById('nextBtn');
const backBtn = document.getElementById('backBtn');
const progressBar = document.getElementById('progressBar');
const resultCard = document.getElementById('resultCard');
const quizCard = document.getElementById('quizCard');
const capaCard = document.getElementById('capaCard');
const resultTitle = document.getElementById('resultTitle');
const resultText = document.getElementById('resultText');
const restartBtn = document.getElementById('restartBtn');
const questionImage = document.getElementById('questionImage');

function render(){

  if(current >= questions.length){
    showResult();
    return;
  }

  const item = questions[current];

  qnum.textContent = `Pergunta ${current+1} de ${questions.length}`;

  qText.textContent = item.q;

  questionImage.src = item.img;

  progressBar.style.width =
  ((current/questions.length)*100) + '%';

  optionsList.innerHTML = '';

  item.options.forEach((opt,i)=>{

    const div = document.createElement('div');

    div.className =
      'option' +
      (answers[current]===i ? ' selected' : '');

    div.textContent = opt.txt;

    div.onclick = ()=>{

      answers[current] = i;

      render();

    };

    optionsList.appendChild(div);

  });

  backBtn.style.display =
    current === 0 ? 'none' : 'inline-block';

  nextBtn.disabled =
    answers[current] === null;

  nextBtn.textContent =
    current === questions.length - 1
    ? 'Ver Resultado'
    : 'Próxima';

}

nextBtn.addEventListener('click',()=>{

  if(answers[current] === null) return;

  current++;

  render();

});

backBtn.addEventListener('click',()=>{

  if(current > 0){

    current--;

    render();

  }

});

function showResult(){

  const totals = {
    "Sanguíneo":0,
    "Colérico":0,
    "Melancólico":0,
    "Fleumático":0
  };

  answers.forEach((ans,index)=>{

    const tipo =
      questions[index].options[ans].t;

    totals[tipo]++;

  });

  const vencedor =
    Object.keys(totals).reduce((a,b)=>
      totals[a] > totals[b] ? a : b
    );

  resultTitle.textContent =
    resultTexts[vencedor].title;

  resultText.textContent =
    resultTexts[vencedor].text;

  quizCard.classList.add('hidden');

  resultCard.classList.remove('hidden');

}

restartBtn.addEventListener('click',()=>{

  current = 0;

  for(let i=0;i<answers.length;i++){
    answers[i] = null;
  }

  resultCard.classList.add('hidden');

  capaCard.classList.remove('hidden');

});

function iniciarQuiz(){

  capaCard.classList.add('hidden');

  quizCard.classList.remove('hidden');

  render();

}

</script>

</body>
</html>
